# fly.toml app configuration file generated for fitness-tracker-eawboa on 2026-04-23T02:01:48Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fitness-tracker-eawboa'
primary_region = 'ams'

[build]

[env]
  DATABASE_PATH = '/data/fitness.db'

[[mounts]]
  source = 'fitness_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
